<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lector de Texto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    .reading-word { transition: background-color 0.1s ease; }
    .reading-word.current { background-color: rgba(99, 102, 241, 0.4); border-radius: 2px; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-indigo-900 text-slate-100 font-sans antialiased flex flex-col lg:flex-row">

  <!-- Sidebar: guardados en localStorage -->
  <aside class="lg:w-80 lg:min-h-screen lg:border-r lg:border-slate-700/50 bg-slate-800/30 flex-shrink-0">
    <div class="p-4 lg:p-6 lg:sticky lg:top-0 lg:max-h-screen lg:overflow-y-auto">
      <h2 class="text-lg font-semibold text-white flex items-center gap-2 mb-4">
        <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4" />
        </svg>
        Textos guardados
      </h2>
      <div class="space-y-3 mb-4">
        <input
          type="text"
          id="saveName"
          placeholder="Nombre del texto"
          class="w-full px-3 py-2 rounded-lg bg-slate-900/60 border border-slate-600/50 text-slate-100 placeholder-slate-500 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
        <button
          type="button"
          onclick="saveToStorage()"
          class="w-full inline-flex items-center justify-center gap-2 px-3 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium transition"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
          Guardar actual
        </button>
      </div>
      <div class="border-t border-slate-700/50 pt-3">
        <p class="text-xs text-slate-500 mb-2">Clic en Cargar o Pronunciar</p>
        <div id="savedList" class="space-y-2 max-h-64 overflow-y-auto lg:max-h-[50vh]">
          <!-- Se llena con JS -->
        </div>
        <p id="savedEmpty" class="text-sm text-slate-500 py-2 hidden">Aún no hay textos guardados.</p>
      </div>
    </div>
  </aside>

  <div class="flex-1 max-w-2xl w-full mx-auto px-4 py-10 sm:py-16 lg:py-12">
    <!-- Header -->
    <header class="text-center mb-10">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-indigo-500/20 text-indigo-400 mb-4">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z" />
        </svg>
      </div>
      <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-white">Lector de Texto</h1>
      <p class="mt-2 text-slate-400 text-sm sm:text-base">Escribe y escucha el texto con voces naturales</p>
    </header>

    <!-- Card -->
    <main class="bg-slate-800/50 backdrop-blur-sm rounded-2xl border border-slate-700/50 shadow-xl shadow-black/20 p-6 sm:p-8">
      <label for="text" class="block text-sm font-medium text-slate-300 mb-2">Texto a leer</label>
      <textarea
        id="text"
        placeholder="Escribe aquí el texto que quieres escuchar..."
        class="w-full h-40 sm:h-44 px-4 py-3 rounded-xl bg-slate-900/60 border border-slate-600/50 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-y transition shadow-inner"
      ></textarea>

      <!-- Vista de lectura con resaltado (visible mientras se lee) -->
      <div id="readingView" class="hidden mt-3 p-4 rounded-xl bg-slate-900/60 border border-slate-600/50 text-slate-100 leading-relaxed min-h-[6rem] max-h-52 overflow-y-auto">
        <div id="readingContent" class="reading-content"></div>
      </div>

      <!-- Estado: Reproduciendo / Pausado -->
      <div id="playbackStatus" class="mt-4 hidden items-center gap-2 text-sm">
        <span class="inline-flex h-2 w-2 rounded-full bg-emerald-400" id="statusDot" aria-hidden="true"></span>
        <span id="statusLabel">Reproduciendo</span>
      </div>

      <!-- Botones de control -->
      <div class="mt-4 flex flex-wrap gap-3">
        <button
          onclick="speakText()"
          id="btnPlay"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-indigo-600 hover:bg-indigo-500 text-white font-medium shadow-lg shadow-indigo-500/25 transition focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:ring-offset-2 focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span class="text-lg" aria-hidden="true">▶</span> Leer
        </button>
        <button
          onclick="pauseText()"
          id="btnPause"
          disabled
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-slate-600 hover:bg-slate-500 text-white font-medium transition focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span class="text-lg" aria-hidden="true">⏸</span> Pausar
        </button>
        <button
          onclick="resumeText()"
          id="btnResume"
          disabled
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-slate-600 hover:bg-slate-500 text-white font-medium transition focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span class="text-lg" aria-hidden="true">⏯</span> Reanudar
        </button>
        <button
          onclick="stopText()"
          id="btnStop"
          disabled
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl bg-slate-600 hover:bg-slate-500 text-white font-medium transition focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <span class="text-lg" aria-hidden="true">⏹</span> Detener
        </button>
      </div>

      <!-- Voz y velocidad -->
      <div class="mt-6 pt-6 border-t border-slate-700/50 flex flex-wrap items-end gap-6">
        <div class="flex-1 min-w-[200px]">
          <label for="voiceSelect" class="block text-sm font-medium text-slate-300 mb-2">Voz</label>
          <select
            id="voiceSelect"
            class="w-full px-4 py-2.5 rounded-xl bg-slate-900/60 border border-slate-600/50 text-slate-100 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent cursor-pointer"
          ></select>
        </div>
        <div class="flex-1 min-w-[180px]">
          <label for="rate" class="block text-sm font-medium text-slate-300 mb-2">
            Velocidad: <span id="rateValue" class="text-indigo-400 font-semibold">1.0</span>x
          </label>
          <input
            type="range"
            id="rate"
            min="0.5"
            max="2"
            step="0.1"
            value="1"
            class="w-full h-2 rounded-lg appearance-none bg-slate-600 accent-indigo-500 cursor-pointer"
          />
        </div>
      </div>
    </main>
  </div>

  <script>
    const synth = window.speechSynthesis;
    const voiceSelect = document.getElementById('voiceSelect');
    const rateInput = document.getElementById('rate');
    const rateValue = document.getElementById('rateValue');

    let voices = [];
    // Chrome/Edge a veces no actualiza synth.paused; llevamos nosotros el estado de pausa
    let playbackPausedByUser = false;

    const allowedVoices = [
      "Microsoft AndrewMultilingual Online (Natural)",
      "Microsoft Aria Online (Natural)",
      "Microsoft AvaMultilingual Online (Natural)",
      "Microsoft BrianMultilingual Online (Natural)",
      "Microsoft Christopher Online (Natural)",
      "Microsoft EmmaMultilingual Online (Natural)",
      "Microsoft Eric Online (Natural)",
      "Microsoft Guy Online (Natural)",
      "Microsoft Jenny Online (Natural)",
      "Microsoft Michelle Online (Natural)",
      "Microsoft Roger Online (Natural)",
      "Microsoft Steffan Online (Natural)"
    ];

    function loadVoices() {
      const allVoices = synth.getVoices();
      voices = allVoices.filter(voice =>
        voice.lang === "en-US" &&
        allowedVoices.some(name => voice.name.includes(name))
      );

      voiceSelect.innerHTML = "";
      voices.forEach((voice, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = voice.name;
        voiceSelect.appendChild(option);
      });

      if (voices.length > 0) {
        voiceSelect.value = 0;
      }
    }

    rateInput.addEventListener('input', () => {
      rateValue.textContent = parseFloat(rateInput.value).toFixed(1);
    });

    loadVoices();
    if (speechSynthesis.onvoiceschanged !== undefined) {
      speechSynthesis.onvoiceschanged = loadVoices;
    }

    // --- Resaltado mientras se lee ---
    const readingView = document.getElementById('readingView');
    const readingContent = document.getElementById('readingContent');

    function buildReadingView(text) {
      readingContent.innerHTML = '';
      let index = 0;
      const parts = text.split(/(\s+)/);
      parts.forEach(part => {
        if (/\S/.test(part)) {
          const span = document.createElement('span');
          span.className = 'reading-word';
          span.dataset.start = index;
          span.dataset.end = index + part.length;
          span.textContent = part;
          readingContent.appendChild(span);
        } else {
          readingContent.appendChild(document.createTextNode(part));
        }
        index += part.length;
      });
    }

    function showReadingView(text) {
      buildReadingView(text);
      readingView.classList.remove('hidden');
    }

    function hideReadingView() {
      readingView.classList.add('hidden');
      readingContent.querySelectorAll('.reading-word.current').forEach(el => el.classList.remove('current'));
    }

    function highlightReadingAt(charIndex, charLength) {
      const end = charIndex + (charLength || 1);
      readingContent.querySelectorAll('.reading-word').forEach(span => {
        const start = parseInt(span.dataset.start, 10);
        const spanEnd = parseInt(span.dataset.end, 10);
        const inRange = start < end && spanEnd > charIndex;
        span.classList.toggle('current', inRange);
        if (inRange) span.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      });
    }

    function speakWithHighlight(text) {
      if (!text.trim()) return;
      if (!voices.length) {
        alert("No hay voces permitidas disponibles en este navegador.");
        return;
      }
      showReadingView(text);
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.voice = voices[voiceSelect.value];
      utterance.rate = parseFloat(rateInput.value);
      utterance.lang = "en-US";
      utterance.onboundary = (e) => {
        if (e.charIndex != null) highlightReadingAt(e.charIndex, e.charLength || 1);
      };
      utterance.onend = () => {
        playbackPausedByUser = false;
        hideReadingView();
        updatePlaybackState();
      };
      synth.cancel();
      playbackPausedByUser = false;
      synth.speak(utterance);
      setTimeout(updatePlaybackState, 50);
    }

    function speakText() {
      const text = document.getElementById("text").value;
      if (!text.trim()) return;
      speakWithHighlight(text);
    }

    function updatePlaybackState() {
      const statusEl = document.getElementById('playbackStatus');
      const statusLabel = document.getElementById('statusLabel');
      const statusDot = document.getElementById('statusDot');
      const btnPause = document.getElementById('btnPause');
      const btnResume = document.getElementById('btnResume');
      const btnStop = document.getElementById('btnStop');

      // Priorizar nuestro estado: si el usuario pausó, mostrar Pausado y habilitar Reanudar
      if (playbackPausedByUser) {
        statusEl.classList.remove('hidden');
        statusEl.classList.add('flex');
        statusLabel.textContent = 'Pausado';
        statusDot.className = 'inline-flex h-2 w-2 rounded-full bg-amber-400';
        btnPause.disabled = true;
        btnResume.disabled = false;
        btnStop.disabled = false;
      } else if (synth.paused) {
        statusEl.classList.remove('hidden');
        statusEl.classList.add('flex');
        statusLabel.textContent = 'Pausado';
        statusDot.className = 'inline-flex h-2 w-2 rounded-full bg-amber-400';
        btnPause.disabled = true;
        btnResume.disabled = false;
        btnStop.disabled = false;
      } else if (synth.speaking) {
        statusEl.classList.remove('hidden');
        statusEl.classList.add('flex');
        statusLabel.textContent = 'Reproduciendo';
        statusDot.className = 'inline-flex h-2 w-2 rounded-full bg-emerald-400';
        btnPause.disabled = false;
        btnResume.disabled = true;
        btnStop.disabled = false;
      } else {
        statusEl.classList.add('hidden');
        statusEl.classList.remove('flex');
        btnPause.disabled = true;
        btnResume.disabled = true;
        btnStop.disabled = true;
      }
    }

    function pauseText() {
      if (synth.speaking) {
        synth.pause();
        playbackPausedByUser = true;
      }
      updatePlaybackState();
    }

    function resumeText() {
      if (playbackPausedByUser || synth.paused) {
        synth.resume();
        playbackPausedByUser = false;
      }
      updatePlaybackState();
    }

    function stopText() {
      playbackPausedByUser = false;
      synth.cancel();
      hideReadingView();
      updatePlaybackState();
    }

    // --- LocalStorage: guardar / cargar / pronunciar ---
    const STORAGE_KEY = 'edge-reader-saved';

    function getSavedItems() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function setSavedItems(items) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
      renderSavedList();
    }

    function saveToStorage() {
      const nameInput = document.getElementById('saveName');
      const textEl = document.getElementById('text');
      const name = (nameInput.value || '').trim() || 'Sin nombre';
      const text = (textEl.value || '').trim();
      if (!text) {
        alert('Escribe algo en el cuadro de texto antes de guardar.');
        return;
      }
      const items = getSavedItems();
      const newItem = {
        id: Date.now().toString(36) + Math.random().toString(36).slice(2),
        title: name,
        text: text,
        createdAt: Date.now()
      };
      items.unshift(newItem);
      setSavedItems(items);
      nameInput.value = '';
    }

    function loadFromStorage(id) {
      const items = getSavedItems();
      const item = items.find(i => i.id === id);
      if (item) {
        document.getElementById('text').value = item.text;
      }
    }

    function speakFromStorage(id) {
      const items = getSavedItems();
      const item = items.find(i => i.id === id);
      if (!item || !item.text.trim()) return;
      speakWithHighlight(item.text);
    }

    function deleteFromStorage(id) {
      const items = getSavedItems().filter(i => i.id !== id);
      setSavedItems(items);
    }

    function renderSavedList() {
      const container = document.getElementById('savedList');
      const emptyMsg = document.getElementById('savedEmpty');
      const items = getSavedItems();
      emptyMsg.classList.toggle('hidden', items.length > 0);
      container.innerHTML = '';
      items.forEach(item => {
        const title = (item.title || 'Sin nombre').slice(0, 30);
        const row = document.createElement('div');
        row.className = 'flex flex-col gap-1 p-2 rounded-lg bg-slate-900/50 border border-slate-700/50';
        row.dataset.id = item.id;
        row.innerHTML = `
          <span class="text-sm font-medium text-slate-200 truncate" title="${escapeHtml(item.title || '')}">${escapeHtml(title)}${(item.title || '').length > 30 ? '…' : ''}</span>
          <div class="flex flex-wrap gap-1 saved-actions">
            <button type="button" data-action="load" class="px-2 py-1 rounded text-xs bg-slate-600 hover:bg-slate-500 text-white">Cargar</button>
            <button type="button" data-action="speak" class="px-2 py-1 rounded text-xs bg-indigo-600 hover:bg-indigo-500 text-white">Pronunciar</button>
            <button type="button" data-action="delete" class="px-2 py-1 rounded text-xs bg-red-900/60 hover:bg-red-800/60 text-white" title="Eliminar">✕</button>
          </div>
        `;
        container.appendChild(row);
      });
    }

    document.getElementById('savedList').addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if (!btn) return;
      const row = btn.closest('[data-id]');
      const id = row && row.dataset.id;
      if (!id) return;
      const action = btn.dataset.action;
      if (action === 'load') loadFromStorage(id);
      else if (action === 'speak') speakFromStorage(id);
      else if (action === 'delete') deleteFromStorage(id);
    });

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    renderSavedList();
  </script>

</body>
</html>
